<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClauseCheck — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #0a0a0a; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      padding: 20px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #fff; text-decoration: none; }
    .logo span { color: #f97316; }
    .nav-back { font-size: 0.8rem; color: #555; text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: #f97316; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-box { width: 100%; max-width: 400px; }
    .auth-box h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: #fff; margin-bottom: 6px; letter-spacing: -0.02em; }
    .auth-box > p { font-size: 0.86rem; color: #666; margin-bottom: 30px; }
    .tabs { display: flex; border-bottom: 1px solid #2a2a2a; margin-bottom: 26px; }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 0.86rem; font-weight: 500; color: #555;
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.2s, border-color 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: #f97316; border-bottom-color: #f97316; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.72rem; font-weight: 600; color: #777; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    input[type="email"], input[type="password"] {
      width: 100%; background: #141414; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 11px 14px;
      font-size: 0.92rem; color: #f0f0f0;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: #f97316; }
    input::placeholder { color: #3a3a3a; }
    .btn-primary {
      width: 100%; background: #f97316; color: #fff;
      border: none; border-radius: 8px; padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      color: #f87171; border-radius: 8px;
      padding: 11px 14px; font-size: 0.83rem;
      margin-top: 14px; display: none;
    }
    .success-msg {
      background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25);
      color: #4ade80; border-radius: 8px;
      padding: 11px 14px; font-size: 0.83rem;
      margin-top: 14px; display: none;
    }
    .forgot { text-align: right; margin-top: -6px; margin-bottom: 14px; }
    .forgot a { font-size: 0.76rem; color: #555; text-decoration: none; transition: color 0.2s; }
    .forgot a:hover { color: #f97316; }
    footer { border-top: 1px solid #1e1e1e; padding: 18px 40px; text-align: center; font-size: 0.75rem; color: #333; }
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: #0a0a0a; z-index: 100;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    #loading-overlay p { color: #666; font-size: 0.88rem; }
    .spinner { width: 26px; height: 26px; border: 2px solid #222; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Signing you in...</p>
</div>

<nav>
  <a href="index.html" class="logo">Clause<span>Check</span></a>
  <a href="index.html" class="nav-back">← Back</a>
</nav>

<main>
  <div class="auth-box">
    <h1>Welcome back</h1>
    <p>AI-powered contract review for small law firms.</p>

    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Sign In -->
    <div id="form-signin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@lawfirm.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="forgot"><a href="#" onclick="showForgot(); return false;">Forgot password?</a></div>
      <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign In</button>
      <div class="error-msg" id="signin-error"></div>
    </div>

    <!-- Sign Up -->
    <div id="form-signup" style="display:none;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@lawfirm.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="signup-btn" onclick="signUp()">Create Account</button>
      <div class="error-msg" id="signup-error"></div>
      <div class="success-msg" id="signup-success"></div>
    </div>

    <!-- Forgot Password -->
    <div id="form-forgot" style="display:none;">
      <p style="font-size:0.84rem; color:#666; margin-bottom:18px;">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="you@lawfirm.com">
      </div>
      <button class="btn-primary" id="forgot-btn" onclick="sendReset()">Send Reset Link</button>
      <div style="margin-top:14px; text-align:center;">
        <a href="#" onclick="switchTab('signin'); return false;" style="font-size:0.8rem; color:#555; text-decoration:none;">← Back to sign in</a>
      </div>
      <div class="error-msg" id="forgot-error"></div>
      <div class="success-msg" id="forgot-success"></div>
    </div>

  </div>
</main>

<footer>&copy; 2026 ClauseCheck &mdash; A Conduit Lab product</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://gmzawvbidpjrqixkdiyh.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtemF3dmJpZHBqcnFpeGtkaXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDEzMjQsImV4cCI6MjA5MTAxNzMyNH0._RctCMV0iF-gBSlv8M9e67cVII2gcy_f2yIDGcSqFo4';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // Already logged in → go to app
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'app.html';
  })();

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('form-forgot').style.display = 'none';
    document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  }

  function showForgot() {
    document.getElementById('form-signin').style.display = 'none';
    document.getElementById('form-signup').style.display = 'none';
    document.getElementById('form-forgot').style.display = 'block';
    document.getElementById('tab-signin').classList.remove('active');
    document.getElementById('tab-signup').classList.remove('active');
  }

  // Write session row to Supabase so the Worker can validate single-device enforcement
  async function registerSession(session) {
    const userId = session.user.id;
    const token  = session.access_token;
    const device = navigator.userAgent;

    // Delete any existing sessions for this user (single-device enforcement)
    await fetch(`${SUPABASE_URL}/rest/v1/sessions?user_id=eq.${userId}`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${token}`,
      }
    });

    // Insert new session row
    await fetch(`${SUPABASE_URL}/rest/v1/sessions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${token}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        user_id: userId,
        session_token: token,
        device_info: device,
      })
    });
  }

  async function signIn() {
    const email    = document.getElementById('signin-email').value.trim();
    const password = document.getElementById('signin-password').value;
    const errorEl  = document.getElementById('signin-error');
    errorEl.style.display = 'none';
    if (!email || !password) { showErr(errorEl, 'Please enter your email and password.'); return; }
    document.getElementById('signin-btn').disabled = true;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showErr(errorEl, error.message); document.getElementById('signin-btn').disabled = false; return; }
    await registerSession(data.session);
    document.getElementById('loading-overlay').style.display = 'flex';
    window.location.href = 'app.html';
  }

  async function signUp() {
    const email     = document.getElementById('signup-email').value.trim();
    const password  = document.getElementById('signup-password').value;
    const confirm   = document.getElementById('signup-confirm').value;
    const errorEl   = document.getElementById('signup-error');
    const successEl = document.getElementById('signup-success');
    errorEl.style.display = 'none'; successEl.style.display = 'none';
    if (!email || !password) { showErr(errorEl, 'Please fill in all fields.'); return; }
    if (password.length < 8) { showErr(errorEl, 'Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showErr(errorEl, 'Passwords do not match.'); return; }
    document.getElementById('signup-btn').disabled = true;
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { showErr(errorEl, error.message); document.getElementById('signup-btn').disabled = false; return; }
    // Email confirmation required — can't write session yet
    if (data.user && !data.session) {
      successEl.textContent = 'Account created! Check your email to confirm your address, then sign in.';
      successEl.style.display = 'block';
      document.getElementById('signup-btn').disabled = false;
      return;
    }
    // Auto-confirmed — write session and go
    await registerSession(data.session);
    document.getElementById('loading-overlay').style.display = 'flex';
    window.location.href = 'app.html';
  }

  async function sendReset() {
    const email     = document.getElementById('forgot-email').value.trim();
    const errorEl   = document.getElementById('forgot-error');
    const successEl = document.getElementById('forgot-success');
    errorEl.style.display = 'none'; successEl.style.display = 'none';
    if (!email) { showErr(errorEl, 'Please enter your email address.'); return; }
    document.getElementById('forgot-btn').disabled = true;
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://dlgambill.github.io/clausecheck/app.html'
    });
    document.getElementById('forgot-btn').disabled = false;
    if (error) { showErr(errorEl, error.message); return; }
    successEl.textContent = 'Reset link sent! Check your inbox.';
    successEl.style.display = 'block';
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('form-forgot').style.display !== 'none') { sendReset(); return; }
    if (document.getElementById('form-signup').style.display !== 'none') { signUp(); return; }
    signIn();
  });
</script>

</body>
</html>
