<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClauseCheck — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 48px;
    }

    .logo span { color: #f97316; }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 16px;
      line-height: 1.15;
    }

    p {
      font-size: 1rem;
      color: #666;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.25);
      color: #f97316;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 20px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    footer {
      position: fixed;
      bottom: 20px;
      font-size: 0.75rem;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="logo">Clause<span>Check</span></div>

  <h1>We're finishing up.<br>Check back soon.</h1>
  <p>AI-powered contract review for small law firms. Launching shortly.</p>

  <div class="badge">
    <div class="dot"></div>
    Under Construction
  </div>

  <footer>&copy; 2026 ClauseCheck</footer>

</body>
</html>
